# Myman
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To My Soulmate Mohamed ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Amiri:ital,wght@0,700;1,400&family=Poppins:ital,wght@0,300;1,400&display=swap" rel="stylesheet">

<style>
:root {
    --burgundy: #4a0404;
    --cream: #fdf5e6;
    --gold: #d4af37;
}

body, html {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: var(--burgundy); overflow-x: hidden; color: var(--cream);
}

.pattern-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('https://www.transparenttextures.com/patterns/60-lines.png');
    opacity: 0.1; z-index: 1; pointer-events: none;
}

.screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: none; justify-content: center; align-items: center;
    flex-direction: column; text-align: center; z-index: 10;
    background: var(--burgundy);
}

.active { display: flex; animation: fadeIn 1.5s forwards; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* باقي التنسيق بدون تغيير */
.avatar-box { width: 160px; height: 160px; border-radius: 50%; border: 2px solid var(--cream); overflow: hidden; background: #fff; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.avatar-img { width: 100%; height: 100%; object-fit: cover; }

.cake-container { font-size: 100px; cursor: pointer; position: relative; }
.candle { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 30px; }

.word-screen { background: var(--burgundy) !important; }

.floating-word {
    position: absolute; color: var(--cream);
    font-family: 'Cinzel', serif;
    font-size: 18px; opacity: 0;
    animation: floatUpward 5s ease-in-out forwards;
}

@keyframes floatUpward {
0% { opacity: 0; transform: translateY(20px); }
20% { opacity: 1; }
80% { opacity: 1; }
100% { opacity: 0; transform: translateY(-100px); }
}

.final-scroll {
    background: var(--cream); color: var(--burgundy);
    width: 85%; max-width: 480px; padding: 45px 30px;
}

/* زر */
.btn-cream {
    background: var(--cream); color: var(--burgundy);
    padding: 14px 40px; border: none;
    border-radius: 50px;
}
</style>
</head>

<body>

<div class="pattern-overlay"></div>

<audio id="bgMusic" loop preload="auto">
<source src="https://www.mboxdrive.com/A%20Thousand%20Years.mp3" type="audio/mpeg">
</audio>

<div id="s1" class="screen active">
    <div style="font-size:100px;cursor:pointer;" onclick="startExperience()">❤️</div>
    <p>A Soul's Journey Begins</p>
</div>

<div id="s3" class="screen">
    <h2>Are you ready, Mohamed?</h2>
    <button class="btn-cream" onclick="next(4)">I'M READY ❤️</button>
</div>

<div id="s4" class="screen">
    <div class="cake-container" onclick="blowCandle()">
        🔥🎂
    </div>
</div>

<div id="s5" class="screen word-screen">
    <div id="word-field"></div>
</div>

<div id="s6" class="screen">
    <div class="final-scroll">
        <h2>To My Eternal Home</h2>
        <p>Happy Birthday Mohamed ❤️</p>
    </div>
</div>

<script>

/* ====== إصلاح الصوت 100% ====== */
let musicStarted = false;

function enableMusic() {
    if (musicStarted) return;

    let music = document.getElementById('bgMusic');
    music.play().catch(()=>{});

    musicStarted = true;
    document.body.removeEventListener('click', enableMusic);
}

/* تشغيل عند أي تفاعل */
document.body.addEventListener('click', enableMusic);

/* ====== التنقل ====== */
function next(n){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('s'+n).classList.add('active');
}

function startExperience(){
    next(3);
}

function blowCandle(){
    next(5);
    showSequence();
}

/* كلمات */
function showSequence(){
    const sequence = ["Happy birthday","My sweetheart","Forever"];
    let i=0;
    let field=document.getElementById('word-field');

    function show(){
        if(i<sequence.length){
            let w=document.createElement('div');
            w.innerText=sequence[i];
            field.appendChild(w);
            i++;
            setTimeout(()=>{w.remove();show();},2000);
        } else {
            next(6);
        }
    }
    show();
}

</script>

</body>
</html>
